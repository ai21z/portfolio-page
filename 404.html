    body {

      background: rgba(5, 12, 9, 0.78);
      font: 600 0.95rem/1 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-decoration: none;
    }

    a:hover { border-color: #9bcbaa; color: #ffffff; }
